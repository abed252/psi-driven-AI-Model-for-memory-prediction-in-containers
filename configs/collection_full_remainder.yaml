# Remainder of the full collection: the 20 runs lost when a docker-daemon
# stall crashed the original batch (runner is now stall-proof; the 16
# completed runs are kept). Distinct base_seed so no seed collides with them.
defaults:
  base_seed: 3000
  interval_s: 1.0
  image: psi-workloads:latest

runs:
  - workload: leak
    repeats: 1
    duration_s: 260
    memory_limit: 192m
    memory_swap: 384m
    params: {step_mib: 2, tick_s: 1.0, retouch_fraction: 0.3}
  - workload: leak
    repeats: 3
    duration_s: 180
    memory_limit: 640m
    memory_swap: 1280m
    params: {step_mib: 3, tick_s: 1.0, retouch_fraction: 0.2}

  - workload: bursty
    repeats: 3
    duration_s: 160
    memory_limit: 192m
    memory_swap: 384m
    params: {burst_mib: 200, hold_s: 8, idle_s: 8}
  - workload: bursty
    repeats: 3
    duration_s: 160
    memory_limit: 256m
    memory_swap: 512m
    params: {burst_mib: 230, hold_s: 12, idle_s: 6}

  - workload: trace_replay
    repeats: 3
    duration_s: 140
    memory_limit: 320m
    memory_swap: 640m
    params: {trace_file: /app/traces/example_trace.csv, scale: 1.2, time_scale: 1.3}
  - workload: trace_replay
    repeats: 3
    duration_s: 130
    memory_limit: 320m
    memory_swap: 640m
    params: {trace_file: /app/traces/spiky.csv, scale: 1.0}

  - workload: mixed
    repeats: 3
    duration_s: 220
    memory_limit: 256m
    memory_swap: 512m
    params: {file_mib: 150, leak_step_mib: 2, tick_s: 1.0, retouch_fraction: 0.3}
  - workload: mixed
    repeats: 3
    duration_s: 200
    memory_limit: 320m
    memory_swap: 640m
    params: {file_mib: 200, leak_step_mib: 3, tick_s: 1.0, retouch_fraction: 0.3}

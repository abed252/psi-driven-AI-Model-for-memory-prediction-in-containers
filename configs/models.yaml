# Model configuration for psi-train / psi-ablate.
seed: 42

heuristic:
  percentile: 95      # Autopilot-style: 95 (p95) or 100 (window max)

rf:
  n_estimators: 300
  max_depth: null     # unlimited
  min_samples_leaf: 2

xgb:
  n_estimators: 400
  max_depth: 6
  learning_rate: 0.08
  subsample: 0.9

lstm:
  hidden_size: 64
  num_layers: 1
  dropout: 0.0
  learning_rate: 0.001
  batch_size: 64
  max_epochs: 200
  patience: 15
  min_delta: 0.0001
  device: cpu
